<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Website Tin Công Nghệ</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#f2f2f2;
}

/* HEADER */

header{
background:#cfcfcf;
text-align:center;
padding:20px;
}

header img{
width:200px;
margin-top:10px;
}

/* MENU */

nav{
background:#d9d9d9;
text-align:center;
padding:10px;
}

nav a{
margin:0 20px;
text-decoration:none;
color:blue;
}

/* LAYOUT */

main{
display:flex;
padding:20px;
}

/* SIDEBAR */

aside{
width:250px;
}

aside input{
width:200px;
margin-bottom:10px;
}

aside button{
padding:5px 10px;
}

/* BODY */

section{
flex:1;
padding-left:30px;
}

/* BÀI VIẾT */

article{
margin-bottom:30px;
}

article img{
width:200px;
margin:10px 0;
}

hr{
margin:20px 0;
}

</style>
</head>

<body>

<header>
<h1>Website Tin Công Nghệ</h1>

<img src="https://cdn.pixabay.com/photo/2016/11/19/14/00/code-1839406_640.jpg">

</header>


<nav>

<a href="#">Tin tức</a>
<a href="#">Học tập</a>
<a href="#">Liên hệ</a>
</nav>


<main>

<aside>

<h3>Form đăng nhập</h3>

<p>Tên đăng nhập</p>
<input type="text">

<p>Mật khẩu</p>
<input type="password">

<br>

<button>Đăng nhập</button>

</aside>


<section>

<article>

<h2>Bài viết 1</h2>

<img src="https://cdn.pixabay.com/photo/2015/01/08/18/25/startup-593327_640.jpg">

<p>HTML5 là ngôn ngữ đánh dấu dùng để xây dựng cấu trúc trang web.</p>

</article>

</article>

</section>

</main>

</html>
